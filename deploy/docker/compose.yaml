services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  # Platform database: Automations, HostGroups, WorkflowHosts
  postgres-platform:
    image: postgres:17-alpine
    container_name: flowforge-db-platform
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_platform
    ports:
      - "5432:5432"
    volumes:
      - flowforge-db-platform-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Host Group: minion
  postgres-minion:
    image: postgres:17-alpine
    container_name: flowforge-db-minion
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_minion
    ports:
      - "5433:5432"
    volumes:
      - flowforge-db-minion-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Host Group: titan
  postgres-titan:
    image: postgres:17-alpine
    container_name: flowforge-db-titan
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_titan
    ports:
      - "5434:5432"
    volumes:
      - flowforge-db-titan-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres-quartz:
    image: postgres:17-alpine
    container_name: flowforge-db-quartz
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_quartz
    ports:
      - "5435:5432"
    volumes:
      - flowforge-db-quartz-data:/var/lib/postgresql/data
      - ./quartz-postgresql.sql:/docker-entrypoint-initdb.d/quartz-postgresql.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: flowforge-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC

  # ── Application Services ───────────────────────────────────────────────────

  webapi:
    build:
      context: ../..
      dockerfile: src/services/FlowForge.WebApi/Dockerfile
    container_name: flowforge-webapi
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres-platform;Database=flowforge_platform;Username=postgres;Password=postgres"
      Redis__ConnectionString: "redis:6379"
      JobConnections__wf-jobs-minion__ConnectionString: "Host=postgres-minion;Database=flowforge_minion;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-minion__Provider: "PostgreSQL"
      JobConnections__wf-jobs-titan__ConnectionString: "Host=postgres-titan;Database=flowforge_titan;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-titan__Provider: "PostgreSQL"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      AllowedOrigins__0: "http://localhost:3000"
    depends_on:
      postgres-platform:
        condition: service_healthy
      postgres-minion:
        condition: service_healthy
      postgres-titan:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  job-automator:
    build:
      context: ../..
      dockerfile: src/services/FlowForge.JobAutomator/Dockerfile
    container_name: flowforge-job-automator
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__QuartzConnection: "Host=postgres-quartz;Database=flowforge_quartz;Username=postgres;Password=postgres"
      Redis__ConnectionString: "redis:6379"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      WebApi__BaseUrl: "http://flowforge-webapi:8080"
    depends_on:
      postgres-quartz:
        condition: service_healthy
      redis:
        condition: service_healthy
      webapi:
        condition: service_healthy

  job-orchestrator:
    build:
      context: ../..
      dockerfile: src/services/FlowForge.JobOrchestrator/Dockerfile
    container_name: flowforge-job-orchestrator
    ports:
      - "8092:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres-platform;Database=flowforge_platform;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-minion__ConnectionString: "Host=postgres-minion;Database=flowforge_minion;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-minion__Provider: "PostgreSQL"
      JobConnections__wf-jobs-titan__ConnectionString: "Host=postgres-titan;Database=flowforge_titan;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-titan__Provider: "PostgreSQL"
      Redis__ConnectionString: "redis:6379"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      PendingJobScanner__ScanIntervalSeconds: "30"
      PendingJobScanner__StaleAfterSeconds: "15"
    depends_on:
      postgres-platform:
        condition: service_healthy
      postgres-minion:
        condition: service_healthy
      postgres-titan:
        condition: service_healthy
      redis:
        condition: service_healthy

  workflowhost-minion:
    build:
      context: ../..
      dockerfile: src/services/FlowForge.WorkflowHost/Dockerfile
    container_name: flowforge-workflowhost-minion
    ports:
      - "8083:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      NODE_NAME: "minion"
      WorkflowHost__EnginePath: "/app/engine/FlowForge.WorkflowEngine.dll"
      ConnectionStrings__DefaultConnection: "Host=postgres-platform;Database=flowforge_platform;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-minion__ConnectionString: "Host=postgres-minion;Database=flowforge_minion;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-minion__Provider: "PostgreSQL"
      Redis__ConnectionString: "redis:6379"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      Smtp__Host: "sandbox.smtp.mailtrap.io"
      Smtp__Port: "2525"
      Smtp__Username: "f6ca15d3562e4a"
      Smtp__Password: "68d121c2227bcb"
      Smtp__EnableSsl: "true"
      Smtp__DefaultFromAddress: "noreply@flowforge.io"
    depends_on:
      postgres-platform:
        condition: service_healthy
      postgres-minion:
        condition: service_healthy
      redis:
        condition: service_healthy

  workflowhost-titan:
    build:
      context: ../..
      dockerfile: src/services/FlowForge.WorkflowHost/Dockerfile
    container_name: flowforge-workflowhost-titan
    ports:
      - "8084:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      NODE_NAME: "titan"
      WorkflowHost__EnginePath: "/app/engine/FlowForge.WorkflowEngine.dll"
      ConnectionStrings__DefaultConnection: "Host=postgres-platform;Database=flowforge_platform;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-titan__ConnectionString: "Host=postgres-titan;Database=flowforge_titan;Username=postgres;Password=postgres"
      JobConnections__wf-jobs-titan__Provider: "PostgreSQL"
      Redis__ConnectionString: "redis:6379"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      Smtp__Host: "sandbox.smtp.mailtrap.io"
      Smtp__Port: "2525"
      Smtp__Username: "f6ca15d3562e4a"
      Smtp__Password: "68d121c2227bcb"
      Smtp__EnableSsl: "true"
      Smtp__DefaultFromAddress: "noreply@flowforge.io"
    depends_on:
      postgres-platform:
        condition: service_healthy
      postgres-titan:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  flowforge-db-platform-data:
  flowforge-db-minion-data:
  flowforge-db-titan-data:
  flowforge-db-quartz-data:
