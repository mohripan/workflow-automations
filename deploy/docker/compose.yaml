services:
  # Platform database: Automations, HostGroups, WorkflowHosts
  postgres-platform:
    image: postgres:17-alpine
    container_name: flowforge-db-platform
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_platform
    ports:
      - "5432:5432"
    volumes:
      - flowforge-db-platform-data:/var/lib/postgresql/data

  # Host Group: minion
  postgres-minion:
    image: postgres:17-alpine
    container_name: flowforge-db-minion
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_minion
    ports:
      - "5433:5432"
    volumes:
      - flowforge-db-minion-data:/var/lib/postgresql/data

  # Host Group: titan
  postgres-titan:
    image: postgres:17-alpine
    container_name: flowforge-db-titan
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_titan
    ports:
      - "5434:5432"
    volumes:
      - flowforge-db-titan-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  flowforge-db-platform-data:
  flowforge-db-minion-data:
  flowforge-db-titan-data:
