services:
  # Platform database: Automations, HostGroups, WorkflowHosts
  postgres-platform:
    image: postgres:17-alpine
    container_name: flowforge-db-platform
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_platform
    ports:
      - "5432:5432"
    volumes:
      - flowforge-db-platform-data:/var/lib/postgresql/data

  # Host Group: minion
  postgres-minion:
    image: postgres:17-alpine
    container_name: flowforge-db-minion
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_minion
    ports:
      - "5433:5432"
    volumes:
      - flowforge-db-minion-data:/var/lib/postgresql/data

  # Host Group: titan
  postgres-titan:
    image: postgres:17-alpine
    container_name: flowforge-db-titan
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_titan
    ports:
      - "5434:5432"
    volumes:
      - flowforge-db-titan-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  postgres-quartz:
    image: postgres:17-alpine
    container_name: flowforge-db-quartz
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowforge_quartz
    ports:
      - "5435:5432"
    volumes:
      - flowforge-db-quartz-data:/var/lib/postgresql/data
      - ./quartz-postgresql.sql:/docker-entrypoint-initdb.d/quartz-postgresql.sql:ro

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: flowforge-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC

volumes:
  flowforge-db-platform-data:
  flowforge-db-minion-data:
  flowforge-db-titan-data:
  flowforge-db-quartz-data:
