# Dapr + Kafka override for FlowForge.
# Usage:
#   docker compose -f compose.yaml -f compose.dapr.yaml up -d --build
#
# This adds:
#   - Apache Kafka (KRaft mode, no Zookeeper)
#   - Dapr sidecars for every application service
#   - Messaging__Provider=dapr environment variable on all services

services:

  # ── Kafka (KRaft — no Zookeeper required) ──────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: flowforge-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Dapr placement service (required for actors, harmless otherwise) ───────
  dapr-placement:
    image: daprio/placement:1.15.3
    container_name: flowforge-dapr-placement
    command: ["./placement", "-port", "50006"]
    ports:
      - "50006:50006"

  # ── Application service overrides (add Messaging__Provider=dapr) ───────────

  webapi:
    environment:
      Messaging__Provider: dapr
      Messaging__Dapr__PubSubName: flowforge-pubsub
    depends_on:
      kafka:
        condition: service_healthy

  job-automator:
    environment:
      Messaging__Provider: dapr
      Messaging__Dapr__PubSubName: flowforge-pubsub
    depends_on:
      kafka:
        condition: service_healthy

  job-orchestrator:
    environment:
      Messaging__Provider: dapr
      Messaging__Dapr__PubSubName: flowforge-pubsub
    depends_on:
      kafka:
        condition: service_healthy

  workflowhost-minion:
    environment:
      Messaging__Provider: dapr
      Messaging__Dapr__PubSubName: flowforge-pubsub
    depends_on:
      kafka:
        condition: service_healthy

  workflowhost-titan:
    environment:
      Messaging__Provider: dapr
      Messaging__Dapr__PubSubName: flowforge-pubsub
    depends_on:
      kafka:
        condition: service_healthy

  # ── Dapr sidecars (one per application service) ────────────────────────────
  # Each sidecar shares the network namespace of its app via network_mode.

  webapi-dapr:
    image: daprio/daprd:1.15.3
    container_name: flowforge-webapi-dapr
    command:
      - "./daprd"
      - "-app-id"
      - "webapi"
      - "-app-port"
      - "8080"
      - "-app-protocol"
      - "http"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-placement-host-address"
      - "dapr-placement:50006"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
    volumes:
      - ./dapr/components:/components:ro
      - ./dapr/config.yaml:/config/config.yaml:ro
    network_mode: "service:webapi"
    depends_on:
      webapi:
        condition: service_healthy
      kafka:
        condition: service_healthy

  job-automator-dapr:
    image: daprio/daprd:1.15.3
    container_name: flowforge-job-automator-dapr
    command:
      - "./daprd"
      - "-app-id"
      - "job-automator"
      - "-app-port"
      - "8080"
      - "-app-protocol"
      - "http"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-placement-host-address"
      - "dapr-placement:50006"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
    volumes:
      - ./dapr/components:/components:ro
      - ./dapr/config.yaml:/config/config.yaml:ro
    network_mode: "service:job-automator"
    depends_on:
      job-automator:
        condition: service_started
      kafka:
        condition: service_healthy

  job-orchestrator-dapr:
    image: daprio/daprd:1.15.3
    container_name: flowforge-job-orchestrator-dapr
    command:
      - "./daprd"
      - "-app-id"
      - "job-orchestrator"
      - "-app-port"
      - "8080"
      - "-app-protocol"
      - "http"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-placement-host-address"
      - "dapr-placement:50006"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
    volumes:
      - ./dapr/components:/components:ro
      - ./dapr/config.yaml:/config/config.yaml:ro
    network_mode: "service:job-orchestrator"
    depends_on:
      job-orchestrator:
        condition: service_started
      kafka:
        condition: service_healthy

  workflowhost-minion-dapr:
    image: daprio/daprd:1.15.3
    container_name: flowforge-workflowhost-minion-dapr
    command:
      - "./daprd"
      - "-app-id"
      - "workflowhost-minion"
      - "-app-port"
      - "8080"
      - "-app-protocol"
      - "http"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-placement-host-address"
      - "dapr-placement:50006"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
    volumes:
      - ./dapr/components:/components:ro
      - ./dapr/config.yaml:/config/config.yaml:ro
    network_mode: "service:workflowhost-minion"
    depends_on:
      workflowhost-minion:
        condition: service_started
      kafka:
        condition: service_healthy

  workflowhost-titan-dapr:
    image: daprio/daprd:1.15.3
    container_name: flowforge-workflowhost-titan-dapr
    command:
      - "./daprd"
      - "-app-id"
      - "workflowhost-titan"
      - "-app-port"
      - "8080"
      - "-app-protocol"
      - "http"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-placement-host-address"
      - "dapr-placement:50006"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
    volumes:
      - ./dapr/components:/components:ro
      - ./dapr/config.yaml:/config/config.yaml:ro
    network_mode: "service:workflowhost-titan"
    depends_on:
      workflowhost-titan:
        condition: service_started
      kafka:
        condition: service_healthy
