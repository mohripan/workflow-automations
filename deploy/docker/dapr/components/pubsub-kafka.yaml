apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: flowforge-pubsub
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "kafka:9092"
    - name: authRequired
      value: "false"
    - name: consumerGroup
      value: "{appid}"
    - name: initialOffset
      value: "oldest"
    - name: maxMessageBytes
      value: "1048576"
